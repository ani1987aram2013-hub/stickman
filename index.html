<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="fon.js"></script>
    <script src="lang.js"></script>
<meta charset="UTF-8">
<title>Ձołamard — Menu</title>
<style>
  :root { --bg:#F1EEE3; --paper:#FAFAF5; --ink:#1A1918; --blue:#1D3FBF; --s1:#C5C0AE; --s2:#B0AB99; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column;
         align-items:center; justify-content:center; font-family:'Courier New',monospace;
         color:var(--ink); gap:28px; user-select:none; padding:32px 16px; }
  h1 { font-size:2.1rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; }
  .sub { font-size:.75rem; letter-spacing:.12em; color:#888; margin-top:4px; text-align:center; }
  .cards { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
  .card { background:var(--paper); padding:32px 36px;
          box-shadow:3px 3px 0 var(--s1),6px 6px 0 var(--s2),9px 9px 0 rgba(0,0,0,.07);
          display:flex; flex-direction:column; gap:14px; min-width:240px; }
  .card-title { font-size:1.05rem; font-weight:700; letter-spacing:.1em; border-bottom:1.5px solid var(--s1); padding-bottom:10px; }
  .levels { display:flex; flex-direction:column; gap:8px; }
  a.lvl { display:flex; align-items:center; gap:10px; text-decoration:none;
          background:#fff; border:1.5px solid #B0A898; box-shadow:0 2px 0 #B0A898;
          border-radius:3px; padding:8px 14px; color:var(--ink); font-family:'Courier New',monospace;
          font-size:.88rem; transition:background .12s, transform .08s; }
  a.lvl:hover { background:#F0EDE0; transform:translateY(-1px); }
  a.lvl:active { transform:translateY(1px); box-shadow:none; }
  .stars { color:#1D3FBF; letter-spacing:1px; min-width:72px; }
  .diff { color:#888; font-size:.72rem; letter-spacing:.07em; }
  footer { font-size:.65rem; letter-spacing:.1em; color:#aaa; }

  .lang-bar { position:fixed; top:14px; right:18px; display:flex; gap:6px; }
  .lang-btn { font-family:'Courier New',monospace; font-size:.65rem; letter-spacing:.05em;
              border:1.5px solid #B0A898; background:#fff; color:var(--ink);
              padding:4px 9px; border-radius:3px; cursor:pointer;
              box-shadow:0 2px 0 #B0A898; transition:background .1s, transform .08s; }
  .lang-btn:hover { background:#F0EDE0; transform:translateY(-1px); }
  .lang-btn.active { background:var(--blue); color:#fff; border-color:var(--blue);
                     box-shadow:0 2px 0 #0f2580; }

  /* ── welcome overlay ── */
  #welcome {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; z-index:200; padding:32px 16px;
    font-family:'Courier New',monospace;
  }
  #welcome h2 { font-size:1.6rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; }
  #welcome p  { font-size:.85rem; color:#666; letter-spacing:.08em; }
  .wq { display:none; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:340px; }
  .wq.active { display:flex; }
  .wq label { font-size:.75rem; letter-spacing:.1em; color:#888; align-self:flex-start; }
  .wq input[type=text], .wq input[type=number] {
    width:100%; padding:10px 14px; border:1.5px solid #B0A898;
    background:#fff; font-family:'Courier New',monospace; font-size:1rem;
    box-shadow:0 2px 0 #B0A898; border-radius:3px; color:var(--ink);
    outline:none;
  }
  .wq input:focus { border-color:var(--blue); box-shadow:0 2px 0 var(--blue); }
  .device-row { display:flex; gap:14px; width:100%; }
  .dev-btn {
    flex:1; padding:18px 10px; border:1.5px solid #B0A898; background:#fff;
    font-family:'Courier New',monospace; font-size:.9rem; letter-spacing:.06em;
    box-shadow:3px 3px 0 #B0A898; border-radius:3px; cursor:pointer;
    color:var(--ink); transition:background .1s, transform .08s;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .dev-btn:hover { background:#F0EDE0; transform:translateY(-1px); }
  .dev-btn span.icon { font-size:2rem; }
  .wbtn {
    padding:10px 28px; border:1.5px solid var(--blue); background:var(--blue);
    color:#fff; font-family:'Courier New',monospace; font-size:.82rem;
    letter-spacing:.1em; border-radius:3px; cursor:pointer;
    box-shadow:0 2px 0 #0f2580; transition:background .1s, transform .08s;
  }
  .wbtn:hover { background:#1630a0; transform:translateY(-1px); }

  /* ── device profile card ── */
  .profile-card {
    background:#fff; border:1.5px solid #B0A898;
    box-shadow:4px 4px 0 #B0A898; border-radius:4px;
    width:100%; max-width:340px; padding:22px 26px;
    display:flex; flex-direction:column; gap:14px;
  }
  .profile-card .pc-row {
    display:flex; align-items:center; gap:12px;
    font-size:.85rem; letter-spacing:.06em;
  }
  .profile-card .pc-row .pc-icon { font-size:1.4rem; min-width:28px; text-align:center; }
  .profile-card .pc-row .pc-label { color:#999; font-size:.65rem; letter-spacing:.1em; display:block; }
  .profile-card .pc-row .pc-val  { font-weight:700; }
  .profile-card .pc-divider { border:none; border-top:1px solid #e0ddd5; margin:0; }
  .ctrl-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:100%;
  }
  .ctrl-key {
    background:#F1EEE3; border:1.5px solid #B0A898;
    border-radius:3px; padding:6px 4px;
    font-size:.72rem; letter-spacing:.05em; text-align:center;
    box-shadow:0 2px 0 #B0A898;
  }
  .ctrl-key .ck-key  { font-weight:700; font-size:.9rem; display:block; }
  .ctrl-key .ck-desc { color:#888; font-size:.6rem; display:block; margin-top:2px; }
  .touch-keys { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; }
  .touch-key {
    background:#F1EEE3; border:1.5px solid #B0A898;
    border-radius:3px; padding:8px 12px;
    font-size:.78rem; letter-spacing:.05em; text-align:center;
    box-shadow:0 2px 0 #B0A898;
  }
  .touch-key .ck-key  { font-weight:700; font-size:1.1rem; display:block; }
  .touch-key .ck-desc { color:#888; font-size:.6rem; display:block; margin-top:2px; }
</style>
</head>
<body>

<!-- ── Welcome flow ── -->
<div id="welcome">
  <h2 id="w-title">Ձołamard</h2>
  <p id="w-sub">Welcome!</p>

  <!-- Step 1: Name -->
  <div class="wq active" id="wq1">
    <label id="lbl-name">Your name?</label>
    <input type="text" id="inp-name" maxlength="24" autocomplete="off" placeholder="…">
    <button class="wbtn" onclick="wNext(1)">→</button>
  </div>

  <!-- Step 2: Age -->
  <div class="wq" id="wq2">
    <label id="lbl-age">Your age?</label>
    <input type="number" id="inp-age" min="1" max="120" placeholder="…">
    <button class="wbtn" onclick="wNext(2)">→</button>
  </div>

  <!-- Step 3: Device -->
  <div class="wq" id="wq3">
    <label id="lbl-device">Phone or PC?</label>
    <div class="device-row">
      <button class="dev-btn" onclick="wDevice('phone')">
        <span class="icon">📱</span>
        <span id="lbl-phone">Phone</span>
      </button>
      <button class="dev-btn" onclick="wDevice('pc')">
        <span class="icon">🖥️</span>
        <span id="lbl-pc">PC</span>
      </button>
    </div>
  </div>

  <!-- Step 4: Device Profile -->
  <div class="wq" id="wq4">
    <div class="profile-card" id="profile-card"></div>
    <button class="wbtn" id="lbl-start" onclick="wFinish()">▶ Start!</button>
  </div>
</div>

<div class="lang-bar">
  <button class="lang-btn" onclick="setLang('hy')" id="btn-hy">🇦🇲 Հայ</button>
  <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">🇷🇺 Рус</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">🇬🇧 Eng</button>
</div>

<header style="text-align:center">
  <h1 data-i18n="title"></h1>
  <p class="sub" data-i18n="subtitle"></p>
</header>

<div class="cards">
  <!-- Game 1 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle1"></div>
    <div class="levels">
      <a class="lvl" href="stickman1_1.html">
        <span class="stars">★</span>
        <span data-i18n="level1">Level 1</span>
        <span class="diff" data-i18n="easy"></span>
      </a>
      <a class="lvl" href="stickman1_2.html">
        <span class="stars">★★</span>
        <span data-i18n="level2">Level 2</span>
        <span class="diff" data-i18n="normal"></span>
      </a>
      <a class="lvl" href="stickman1_3.html">
        <span class="stars">★★★</span>
        <span data-i18n="level3">Level 3</span>
        <span class="diff" data-i18n="hard"></span>
      </a>
      <a class="lvl" href="stickman1_4.html">
        <span class="stars">★★★★</span>
        <span data-i18n="level4">Level 4</span>
        <span class="diff" data-i18n="vhard"></span>
      </a>
    </div>
  </div>

  <!-- Game 2 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle2"></div>
    <div class="levels">
      <a class="lvl" href="stickman2_1.html">
        <span class="stars">★</span>
        <span data-i18n="level1">Level 1</span>
        <span class="diff" data-i18n="easy"></span>
      </a>
      <a class="lvl" href="stickman2_2.html">
        <span class="stars">★★</span>
        <span data-i18n="level2">Level 2</span>
        <span class="diff" data-i18n="normal"></span>
      </a>
      <a class="lvl" href="stickman2_3.html">
        <span class="stars">★★★</span>
        <span data-i18n="level3">Level 3</span>
        <span class="diff" data-i18n="hard"></span>
      </a>
      <a class="lvl" href="stickman2_4.html">
        <span class="stars">★★★★</span>
        <span data-i18n="level4">Level 4</span>
        <span class="diff" data-i18n="vhard"></span>
      </a>
      <a class="lvl" href="stickman2_5.html">
        <span class="stars">★★★★★</span>
        <span data-i18n="level5">Level 5</span>
        <span class="diff" data-i18n="extreme"></span>
      </a>
    </div>
  </div>
</div>.

  <!-- Game 3 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle3"></div>
    <div class="levels">
      <a class="lvl" href="stickman3.html">
        <span class="stars">★★★</span>
        <span data-i18n="g3_1p"></span>
        <span class="diff" data-i18n="g3_1p_d"></span>
      </a>
      <a class="lvl" href="stickman3_2p.html">
        <span class="stars" style="color:#1D3FBF">★★★</span>
        <span data-i18n="g3_2p"></span>
        <span class="diff" data-i18n="g3_2p_d"></span>
      </a>
      <a class="lvl" href="stickman3_2p_1.html">
        <span class="stars" style="color:#e02244">❤❤❤</span>
        <span data-i18n="g3_2ph"></span>
        <span class="diff" data-i18n="g3_2ph_d"></span>
      </a>
      <a class="lvl" href="stickman3_ai.html">
        <span class="stars" style="color:#ff9900">🤖🤖🤖</span>
        <span data-i18n="g3_ai"></span>
        <span class="diff" data-i18n="g3_ai_d"></span>
      </a>
    </div>
  </div>

<footer data-i18n="footer"></footer>

<script>
// lang.js (loaded in <head>) handles applyLang() and setLang()

// ── Welcome flow ──────────────────────────────────────────────────────────────
const W_STRINGS = {
  hy: {
    title:'Ձողամարդ', sub:'Բարի գալուստ!',
    name:'Անունդ?', age:'Տարիքդ?', device:'Հեռախոսո՞վ, թե՞ PC?',
    phone:'Հեռախոս', pc:'PC',
    start:'▶ Սկսել!',
    profileTitle:'Խաղացողի պրոֆիլ',
    labelName:'Անուն', labelAge:'Տարիք', labelDevice:'Սարք',
    controls:'Կառավարում',
    // pc controls
    pc_left:'← Ձախ', pc_right:'→ Աջ', pc_jump:'↑ Ցատկ', pc_space:'Space Ցատկ', pc_restart:'R Ռեստ.',
    // phone controls
    ph_left:'◀ Ձախ', ph_right:'▶ Աջ', ph_jump:'▲ Ցատկ',
  },
  ru: {
    title:'Палочник', sub:'Добро пожаловать!',
    name:'Твоё имя?', age:'Сколько лет?', device:'Телефон или ПК?',
    phone:'Телефон', pc:'ПК',
    start:'▶ Играть!',
    profileTitle:'Профиль игрока',
    labelName:'Имя', labelAge:'Возраст', labelDevice:'Устройство',
    controls:'Управление',
    pc_left:'← Влево', pc_right:'→ Вправо', pc_jump:'↑ Прыжок', pc_space:'Space Прыжок', pc_restart:'R Рестарт',
    ph_left:'◀ Влево', ph_right:'▶ Вправо', ph_jump:'▲ Прыжок',
  },
  en: {
    title:'Stickman', sub:'Welcome!',
    name:'Your name?', age:'Your age?', device:'Phone or PC?',
    phone:'Phone', pc:'PC',
    start:'▶ Start!',
    profileTitle:'Player Profile',
    labelName:'Name', labelAge:'Age', labelDevice:'Device',
    controls:'Controls',
    pc_left:'← Left', pc_right:'→ Right', pc_jump:'↑ Jump', pc_space:'Space Jump', pc_restart:'R Restart',
    ph_left:'◀ Left', ph_right:'▶ Right', ph_jump:'▲ Jump',
  },
};

function _wt() {
  const code = localStorage.getItem('lang') || 'hy';
  return W_STRINGS[code] || W_STRINGS.en;
}

function _applyWelcomeText() {
  const t = _wt();
  document.getElementById('w-title').textContent    = t.title;
  document.getElementById('w-sub').textContent      = t.sub;
  document.getElementById('lbl-name').textContent   = t.name;
  document.getElementById('lbl-age').textContent    = t.age;
  document.getElementById('lbl-device').textContent = t.device;
  document.getElementById('lbl-phone').textContent  = t.phone;
  document.getElementById('lbl-pc').textContent     = t.pc;
  document.getElementById('lbl-start').textContent  = t.start;
}

// Re-apply welcome text when language changes
const _origSetLang = setLang;
setLang = function(code) { _origSetLang(code); _applyWelcomeText(); };

function wNext(step) {
  if (step === 1) {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) { document.getElementById('inp-name').focus(); return; }
    localStorage.setItem('player_name', name);
    document.getElementById('wq1').classList.remove('active');
    document.getElementById('wq2').classList.add('active');
    document.getElementById('inp-age').focus();
  } else if (step === 2) {
    const age = document.getElementById('inp-age').value.trim();
    if (!age || isNaN(age) || +age < 1) { document.getElementById('inp-age').focus(); return; }
    localStorage.setItem('player_age', age);
    document.getElementById('wq2').classList.remove('active');
    document.getElementById('wq3').classList.add('active');
  }
}

function wDevice(device) {
  localStorage.setItem('player_device', device);
  document.getElementById('wq3').classList.remove('active');
  _buildProfile(device);
  document.getElementById('wq4').classList.add('active');
}

function _buildProfile(device) {
  const t    = _wt();
  const name = localStorage.getItem('player_name') || '—';
  const age  = localStorage.getItem('player_age')  || '—';
  const isPhone = device === 'phone';
  const devIcon = isPhone ? '📱' : '🖥️';
  const devLabel = isPhone ? t.phone : t.pc;

  const pcKeys = [
    { key:'←', desc: t.pc_left.split(' ').slice(1).join(' ') },
    { key:'→', desc: t.pc_right.split(' ').slice(1).join(' ') },
    { key:'↑ / Space', desc: t.pc_jump.split(' ').slice(1).join(' ') },
    { key:'R', desc: t.pc_restart.split(' ').slice(1).join(' ') },
  ];
  const phKeys = [
    { key:'◀', desc: t.ph_left.split(' ').slice(1).join(' ') },
    { key:'▶', desc: t.ph_right.split(' ').slice(1).join(' ') },
    { key:'▲', desc: t.ph_jump.split(' ').slice(1).join(' ') },
  ];
  const keys = isPhone ? phKeys : pcKeys;
  const keyClass = isPhone ? 'touch-key' : 'ctrl-key';
  const gridClass = isPhone ? 'touch-keys' : 'ctrl-grid';

  const keysHtml = keys.map(k =>
    `<div class="${keyClass}"><span class="ck-key">${k.key}</span><span class="ck-desc">${k.desc}</span></div>`
  ).join('');

  document.getElementById('profile-card').innerHTML = `
    <div class="pc-row">
      <span class="pc-icon">👤</span>
      <div><span class="pc-label">${t.labelName}</span><span class="pc-val">${name}</span></div>
    </div>
    <hr class="pc-divider">
    <div class="pc-row">
      <span class="pc-icon">🎂</span>
      <div><span class="pc-label">${t.labelAge}</span><span class="pc-val">${age}</span></div>
    </div>
    <hr class="pc-divider">
    <div class="pc-row">
      <span class="pc-icon">${devIcon}</span>
      <div><span class="pc-label">${t.labelDevice}</span><span class="pc-val">${devLabel}</span></div>
    </div>
    <hr class="pc-divider">
    <div class="pc-row" style="flex-direction:column;align-items:flex-start;gap:8px;">
      <span class="pc-label">${t.controls}</span>
      <div class="${gridClass}">${keysHtml}</div>
    </div>
  `;
}

function wFinish() {
  localStorage.setItem('player_welcomed', '1');
  document.getElementById('welcome').style.display = 'none';
}

// Allow Enter key to advance
document.getElementById('inp-name').addEventListener('keydown', e => { if(e.key==='Enter') wNext(1); });
document.getElementById('inp-age').addEventListener('keydown',  e => { if(e.key==='Enter') wNext(2); });

// Apply translated labels then show/skip
_applyWelcomeText();
if (localStorage.getItem('player_welcomed') === '1') {
  document.getElementById('welcome').style.display = 'none';
} else {
  document.getElementById('inp-name').focus();
}
</script>
</body>
</html>
