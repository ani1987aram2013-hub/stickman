<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Ձողամard — Меню</title>
<style>
  :root { --bg:#F1EEE3; --paper:#FAFAF5; --ink:#1A1918; --blue:#1D3FBF; --s1:#C5C0AE; --s2:#B0AB99; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column;
         align-items:center; justify-content:center; font-family:'Courier New',monospace;
         color:var(--ink); gap:28px; user-select:none; padding:32px 16px; }
  h1 { font-size:2.1rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; }
  .sub { font-size:.75rem; letter-spacing:.12em; color:#888; margin-top:4px; text-align:center; }
  .cards { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
  .card { background:var(--paper); padding:32px 36px;
          box-shadow:3px 3px 0 var(--s1),6px 6px 0 var(--s2),9px 9px 0 rgba(0,0,0,.07);
          display:flex; flex-direction:column; gap:14px; min-width:240px; }
  .card-title { font-size:1.05rem; font-weight:700; letter-spacing:.1em; border-bottom:1.5px solid var(--s1); padding-bottom:10px; }
  .levels { display:flex; flex-direction:column; gap:8px; }
  a.lvl { display:flex; align-items:center; gap:10px; text-decoration:none;
          background:#fff; border:1.5px solid #B0A898; box-shadow:0 2px 0 #B0A898;
          border-radius:3px; padding:8px 14px; color:var(--ink); font-family:'Courier New',monospace;
          font-size:.88rem; transition:background .12s, transform .08s; }
  a.lvl:hover { background:#F0EDE0; transform:translateY(-1px); }
  a.lvl:active { transform:translateY(1px); box-shadow:none; }
  .stars { color:#1D3FBF; letter-spacing:1px; min-width:72px; }
  .diff { color:#888; font-size:.72rem; letter-spacing:.07em; }
  footer { font-size:.65rem; letter-spacing:.1em; color:#aaa; }

  .lang-bar { position:fixed; top:14px; right:18px; display:flex; gap:6px; }
  .lang-btn { font-family:'Courier New',monospace; font-size:.65rem; letter-spacing:.05em;
              border:1.5px solid #B0A898; background:#fff; color:var(--ink);
              padding:4px 9px; border-radius:3px; cursor:pointer;
              box-shadow:0 2px 0 #B0A898; transition:background .1s, transform .08s; }
  .lang-btn:hover { background:#F0EDE0; transform:translateY(-1px); }
  .lang-btn.active { background:var(--blue); color:#fff; border-color:var(--blue);
                     box-shadow:0 2px 0 #0f2580; }
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn" onclick="setLang('hy')" id="btn-hy">🇦🇲 Հայ</button>
  <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">🇷🇺 Рус</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">🇬🇧 Eng</button>
</div>

<header style="text-align:center">
  <h1 data-i18n="title"></h1>
  <p class="sub" data-i18n="subtitle"></p>
</header>

<div class="cards">
  <!-- Game 1 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle1"></div>
    <div class="levels">
      <a class="lvl" href="stickman1_1.html">
        <span class="stars">★</span>
        <span data-i18n="level1">Level 1</span>
        <span class="diff" data-i18n="easy"></span>
      </a>
      <a class="lvl" href="stickman1_2.html">
        <span class="stars">★★</span>
        <span data-i18n="level2">Level 2</span>
        <span class="diff" data-i18n="normal"></span>
      </a>
      <a class="lvl" href="stickman1_3.html">
        <span class="stars">★★★</span>
        <span data-i18n="level3">Level 3</span>
        <span class="diff" data-i18n="hard"></span>
      </a>
      <a class="lvl" href="stickman1_4.html">
        <span class="stars">★★★★</span>
        <span data-i18n="level4">Level 4</span>
        <span class="diff" data-i18n="vhard"></span>
      </a>
    </div>
  </div>

  <!-- Game 3 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle3"></div>
    <div class="levels">
      <a class="lvl" href="stickman3.html">
        <span class="stars">★★★</span>
        <span data-i18n="g3_1p"></span>
        <span class="diff" data-i18n="g3_1p_d"></span>
      </a>
      <a class="lvl" href="stickman3_2p.html">
        <span class="stars" style="color:#1D3FBF">★★★</span>
        <span data-i18n="g3_2p"></span>
        <span class="diff" data-i18n="g3_2p_d"></span>
      </a>
      <a class="lvl" href="stickman3_2p_1.html">
        <span class="stars" style="color:#e02244">❤❤❤</span>
        <span data-i18n="g3_2ph"></span>
        <span class="diff" data-i18n="g3_2ph_d"></span>
      </a>
      <a class="lvl" href="stickman3_ai.html">
        <span class="stars" style="color:#ff9900">🤖🤖🤖</span>
        <span data-i18n="g3_ai"></span>
        <span class="diff" data-i18n="g3_ai_d"></span>
      </a>
    </div>
  </div>

  <!-- Game 2 -->
  <div class="card">
    <div class="card-title" data-i18n="cardTitle2"></div>
    <div class="levels">
      <a class="lvl" href="stickman2_1.html">
        <span class="stars">★</span>
        <span data-i18n="level1">Level 1</span>
        <span class="diff" data-i18n="easy"></span>
      </a>
      <a class="lvl" href="stickman2_2.html">
        <span class="stars">★★</span>
        <span data-i18n="level2">Level 2</span>
        <span class="diff" data-i18n="normal"></span>
      </a>
      <a class="lvl" href="stickman2_3.html">
        <span class="stars">★★★</span>
        <span data-i18n="level3">Level 3</span>
        <span class="diff" data-i18n="hard"></span>
      </a>
      <a class="lvl" href="stickman2_4.html">
        <span class="stars">★★★★</span>
        <span data-i18n="level4">Level 4</span>
        <span class="diff" data-i18n="vhard"></span>
      </a>
      <a class="lvl" href="stickman2_5.html">
        <span class="stars">★★★★★</span>
        <span data-i18n="level5">Level 5</span>
        <span class="diff" data-i18n="extreme"></span>
      </a>
    </div>
  </div>
</div>

<footer data-i18n="footer"></footer>

<script>
const LANGS = {
  hy: {
    title: 'Ձողամարդ',
    subtitle: 'ընտրիր մակարդակ',
    level1: 'Մարդում 1', level2: 'Մարդում 2', level3: 'Մարդում 3',
    level4: 'Մարդում 4', level5: 'Մարդում 5',
    easy:   'հեշտ',
    normal: 'նորմալ',
    hard:   'դժվար',
    vhard:  'շատ դժվար',
    extreme:'EXTREME',
    g3_1p:   '1 Հոգի',    g3_1p_d:  'ցատկ ↑',
    g3_2p:   '2 Հոգի',    g3_2p_d:  'կոոպ ↑',
    g3_2ph:  '2 Հոգի ❤', g3_2ph_d: 'սրտիկներ ↑',
    g3_ai:   'vs AI ❤',  g3_ai_d:  'AI ծրածոր ↑',
    footer: '← / → շարժ  ·  ↑ / Space ցատկ  ·  R ռեստարտ',
    cardTitle1: 'Ձողամարդ ①',
    cardTitle2: 'Ձողամարդ ②',
    cardTitle3: 'Ձողամարդ ③ ↑',
  },
  ru: {
    title: 'Палочник',
    subtitle: 'Выбери уровень',
    level1: 'Уровень 1', level2: 'Уровень 2', level3: 'Уровень 3',
    level4: 'Уровень 4', level5: 'Уровень 5',
    easy:   'легко',
    normal: 'нормально',
    hard:   'сложно',
    vhard:  'оч. сложно',
    extreme:'ЭКСТРИМ',
    g3_1p:   '1 Игрок',    g3_1p_d:  'прыжок ↑',
    g3_2p:   '2 Игрока',   g3_2p_d:  'коопер. ↑',
    g3_2ph:  '2 Игрока ❤', g3_2ph_d: 'сердечки ↑',
    g3_ai:   'vs ИИ ❤',   g3_ai_d:  'vs ИИ ↑',
    footer: '← / → движение  ·  ↑ / Space прыжок  ·  R рестарт',
    cardTitle1: 'Палочник ①',
    cardTitle2: 'Палочник ②',
    cardTitle3: 'Палочник ③ ↑',
  },
  en: {
    title: 'Stickman',
    subtitle: 'Choose a level',
    level1: 'Level 1', level2: 'Level 2', level3: 'Level 3',
    level4: 'Level 4', level5: 'Level 5',
    easy:   'easy',
    normal: 'normal',
    hard:   'hard',
    vhard:  'very hard',
    extreme:'EXTREME',
    g3_1p:   '1 Player',    g3_1p_d:  'jump ↑',
    g3_2p:   '2 Players',   g3_2p_d:  'co-op ↑',
    g3_2ph:  '2 Players ❤', g3_2ph_d: 'hearts ↑',
    g3_ai:   'vs AI ❤',    g3_ai_d:  'AI battle ↑',
    footer: '← / → move  ·  ↑ / Space jump  ·  R restart',
    cardTitle1: 'Stickman ①',
    cardTitle2: 'Stickman ②',
    cardTitle3: 'Stickman ③ ↑',
  },
};

function setLang(code){
  const t = LANGS[code];
  if(!t) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if(v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+code).classList.add('active');
  document.documentElement.lang = code;
  localStorage.setItem('lang', code);
}

setLang(localStorage.getItem('lang') || 'hy');
</script>
</body>
</html>
